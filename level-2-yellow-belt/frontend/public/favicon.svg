<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Outer Ring representing Liquidity Pool -->
  <circle cx="64" cy="64" r="50" fill="url(#glowGrad)" stroke="url(#grad)" stroke-width="4" />
  
  <!-- Yield Anchor Symbol -->
  <!-- Crossbar of Anchor -->
  <line x1="44" y1="52" x2="84" y2="52" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Vertical Shaft -->
  <line x1="64" y1="28" x2="64" y2="88" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Top ring of Anchor -->
  <circle cx="64" cy="28" r="10" fill="none" stroke="url(#grad)" stroke-width="6" />
  
  <!-- Crescent Flukes of Anchor (Curved Bottom with Arrows pointing up representing Yield Growth) -->
  <path d="M 32,72 C 32,96 96,96 96,72" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Upward growth arrowheads on the fluke tips -->
  <path d="M 26,76 L 32,68 L 38,76" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 90,76 L 96,68 L 102,76" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Percentage nodes styled as leaves -->
  <circle cx="50" cy="42" r="5" fill="#ffffff" />
  <circle cx="78" cy="62" r="5" fill="#ffffff" />
</svg>
